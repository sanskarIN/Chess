name: chess_master
description: A privacy-respecting, offline-first, open-source Android chess game.
publish_to: none
version: 0.3.0+3

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.6
  sqflite: ^2.4.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
