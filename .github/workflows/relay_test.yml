name: Friend relay

on:
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - "protocol/**"
      - ".github/workflows/relay_test.yml"
  pull_request:
    paths:
      - "server/**"
      - "protocol/**"
      - ".github/workflows/relay_test.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm audit --omit=dev
