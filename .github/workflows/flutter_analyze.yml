name: Flutter analyze

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.7
          cache: true
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
